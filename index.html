<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>I/3 Votice – Oldřichovec</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#1a1a2e; --panel:#16213e; --panel2:#0f3460;
  --accent:#e94560; --accent2:#f5a623;
  --text:#eaeaea; --text2:#a0aec0;
  --green:#48bb78; --border:rgba(255,255,255,0.08); --radius:12px;
}
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; height:100vh; overflow:hidden; display:flex; flex-direction:column; }

#header { background:var(--panel); border-bottom:1px solid var(--border); padding:10px 14px; display:flex; align-items:center; gap:10px; z-index:1000; flex-shrink:0; }
#header h1 { font-size:15px; font-weight:700; flex:1; }
#header h1 span { color:var(--accent); }
#km-display { background:var(--panel2); border:1px solid var(--accent); border-radius:8px; padding:4px 10px; font-size:13px; font-weight:700; color:var(--accent2); min-width:90px; text-align:center; }
#btn-layers { background:var(--panel2); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:6px 10px; font-size:13px; cursor:pointer; white-space:nowrap; }

#map { flex:1; width:100%; z-index:1; }

#layers-panel { position:fixed; top:56px; right:0; width:250px; background:var(--panel); border-left:1px solid var(--border); border-bottom:1px solid var(--border); border-radius:0 0 0 var(--radius); z-index:2000; display:none; padding:12px; }
#layers-panel.open { display:block; }
#layers-panel h3 { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text2); margin-bottom:8px; margin-top:10px; }
#layers-panel h3:first-child { margin-top:0; }
.layer-row { display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:14px; }
.layer-row:last-child { border-bottom:none; }
#basemap-row { display:flex; gap:5px; margin-bottom:4px; }
.bm-btn { flex:1; background:var(--panel2); border:1px solid var(--border); border-radius:6px; color:var(--text2); font-size:10px; padding:5px 2px; cursor:pointer; text-align:center; transition:all .15s; }
.bm-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(233,69,96,0.1); }
.toggle { position:relative; width:38px; height:20px; flex-shrink:0; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; inset:0; background:#333; border-radius:20px; transition:.2s; cursor:pointer; }
.toggle-slider:before { content:''; position:absolute; width:14px; height:14px; left:3px; top:3px; background:white; border-radius:50%; transition:.2s; }
.toggle input:checked + .toggle-slider { background:var(--accent); }
.toggle input:checked + .toggle-slider:before { transform:translateX(18px); }

#btn-gps { position:fixed; bottom:24px; right:16px; width:48px; height:48px; border-radius:50%; background:var(--panel2); border:2px solid var(--border); color:var(--text); font-size:22px; cursor:pointer; z-index:1500; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(0,0,0,.4); transition:all .2s; }
#btn-gps.active { border-color:var(--green); color:var(--green); box-shadow:0 0 16px rgba(72,187,120,.4); }

#toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:8px 16px; font-size:13px; z-index:3000; opacity:0; transition:all .3s; white-space:nowrap; pointer-events:none; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ══ STANIČENÍ ══
   Logika: iconAnchor=[šířka, výška] = pravý dolní roh ikony sedí přesně na souřadnici.
   Wrapper je flexbox s align-items:flex-end → čárka vpravo (= na ose).
   Text je nad čárkou, zarovnaný doprava (= vlevo od osy v mapě).
*/
.staniceni-100, .staniceni-20 {
  background: transparent !important;
  border: none !important;
  overflow: visible !important;
}
.st100-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  cursor: pointer;
  user-select: none;
}
.st100-label {
  color: #f5a623;
  font-size: 26px;
  font-weight: 900;
  white-space: nowrap;
  line-height: 1;
  text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0 0 10px #000;
  transition: color .15s;
}
.st100-line {
  width: 2px;
  height: 16px;
  background: #f5a623;
  margin-top: 3px;
  flex-shrink: 0;
  box-shadow: 0 0 4px #000;
}
.st100-wrap:hover .st100-label { color: #ffd166; }

.st20-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  cursor: pointer;
  user-select: none;
}
.st20-label {
  color: #bbb;
  font-size: 18px;
  font-weight: 700;
  white-space: nowrap;
  line-height: 1;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
}
.st20-line {
  width: 1px;
  height: 10px;
  background: #999;
  margin-top: 2px;
  flex-shrink: 0;
}
.st20-wrap:hover .st20-label { color: #ddd; }

.gps-dot { width:16px; height:16px; background:var(--green); border-radius:50%; border:3px solid white; }
@keyframes pulse-gps {
  0%   { box-shadow:0 0 0 0   rgba(72,187,120,.6); }
  70%  { box-shadow:0 0 0 14px rgba(72,187,120,0); }
  100% { box-shadow:0 0 0 0   rgba(72,187,120,0); }
}
.gps-dot { animation:pulse-gps 2s infinite; }

#pdf-panel { position:fixed; bottom:0; left:0; right:0; height:55vh; background:var(--panel); border-top:2px solid var(--accent); z-index:2500; display:none; flex-direction:column; }
#pdf-panel.open { display:flex; }
#pdf-panel.fullscreen { height:100vh; top:0; }
#pdf-header { display:flex; align-items:center; padding:6px 10px; background:var(--panel2); gap:6px; flex-shrink:0; }
#pdf-title { flex:1; font-size:12px; font-weight:600; color:var(--accent2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#pdf-counter { font-size:11px; color:var(--text2); white-space:nowrap; }
#btn-pdf-close,#btn-pdf-fs { background:none; border:none; color:var(--text2); font-size:18px; cursor:pointer; padding:2px 6px; }
#btn-pdf-close:hover,#btn-pdf-fs:hover { color:var(--text); }
#btn-pdf-prev,#btn-pdf-next { background:var(--panel); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:22px; cursor:pointer; padding:0 8px; line-height:1.4; flex-shrink:0; }
#btn-pdf-prev:hover,#btn-pdf-next:hover { background:var(--panel2); }
#btn-pdf-prev:disabled,#btn-pdf-next:disabled { opacity:0.3; cursor:default; }
#pdf-tabs { display:flex; gap:4px; padding:6px 10px; background:var(--bg); flex-shrink:0; overflow-x:auto; }
.pdf-tab { background:var(--panel2); border:1px solid var(--border); border-radius:6px; color:var(--text2); font-size:11px; padding:4px 10px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.pdf-tab.active { border-color:var(--accent); color:var(--accent); background:rgba(233,69,96,0.12); }
#pdf-frame { flex:1; border:none; width:100%; background:#222; }
#pdf-nosit { flex:1; display:none; align-items:center; justify-content:center; color:var(--text2); font-size:14px; flex-direction:column; gap:8px; text-align:center; padding:20px; }
#pdf-nosit span { font-size:36px; }

.leaflet-popup-content-wrapper { background:var(--panel2) !important; color:var(--text) !important; border:1px solid var(--border) !important; border-radius:var(--radius) !important; }
.leaflet-popup-tip { background:var(--panel2) !important; }
.leaflet-popup-content { font-size:13px; line-height:1.6; }

/* Pracovní příčné řezy marker */
.pr-marker {
  background: transparent !important;
  border: none !important;
  overflow: visible !important;
}
.pr-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  cursor: pointer;
  user-select: none;
}
.pr-label {
  color: #4fc3f7;
  font-size: 13px;
  font-weight: 800;
  white-space: nowrap;
  line-height: 1;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
  background: rgba(0,30,60,0.6);
  border: 1px solid #4fc3f7;
  border-radius: 3px;
  padding: 1px 4px;
}
.pr-line {
  width: 1px;
  height: 8px;
  background: #4fc3f7;
  margin-top: 1px;
  align-self: flex-end;
}


/* ══ POZNÁMKY ══ */
#note-modal {
  position:fixed; inset:0; background:rgba(0,0,0,.7);
  z-index:4000; display:none; align-items:flex-end; justify-content:center;
}
#note-modal.open { display:flex; }
#note-box {
  background:var(--panel); width:100%; max-width:520px;
  border-radius:16px 16px 0 0; padding:16px;
  max-height:90vh; overflow-y:auto;
  border-top:2px solid var(--accent);
}
#note-box h3 { font-size:15px; font-weight:700; margin-bottom:12px; color:var(--accent2); }

.note-cats { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.note-cat {
  padding:5px 10px; border-radius:20px; font-size:12px; font-weight:700;
  cursor:pointer; border:2px solid transparent; opacity:.6; transition:.15s;
}
.note-cat.sel { opacity:1; border-color:#fff; }
.nc-0  { background:#546e7a; color:#fff; }
.nc-1  { background:#1565c0; color:#fff; }
.nc-2  { background:#6a1b9a; color:#fff; }
.nc-3  { background:#b71c1c; color:#fff; }
.nc-4  { background:#2e7d32; color:#fff; }
.nc-5  { background:#e65100; color:#fff; }

.note-field { width:100%; background:var(--panel2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); padding:8px 10px; font-size:14px;
  margin-bottom:10px; box-sizing:border-box; font-family:inherit; }
.note-field:focus { outline:none; border-color:var(--accent); }
textarea.note-field { min-height:80px; resize:vertical; }

.note-photos-preview { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.note-thumb { position:relative; width:70px; height:70px; }
.note-thumb img { width:100%; height:100%; object-fit:cover; border-radius:6px; }
.note-thumb-del {
  position:absolute; top:-4px; right:-4px; width:18px; height:18px;
  background:var(--accent); color:#fff; border:none; border-radius:50%;
  font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center;
}

.note-btns { display:flex; gap:8px; margin-top:4px; }
.note-btn {
  flex:1; padding:10px; border-radius:8px; border:none; cursor:pointer;
  font-size:14px; font-weight:700;
}
.note-btn-save { background:var(--accent); color:#fff; }
.note-btn-cancel { background:var(--panel2); color:var(--text2); border:1px solid var(--border); }
.note-btn-addphoto { background:var(--panel2); color:var(--text2); border:1px solid var(--border); flex:0 0 auto; padding:10px 14px; }

/* Markery poznámek */
.note-marker-pin {
  width:30px; height:30px; border-radius:50% 50% 50% 0;
  transform:rotate(-45deg); border:2px solid rgba(255,255,255,.8);
  box-shadow:0 2px 6px rgba(0,0,0,.5); cursor:pointer;
  transition:transform .15s;
}
.note-marker-pin:hover { transform:rotate(-45deg) scale(1.2); }
.nm-0 { background:#546e7a; }
.nm-1 { background:#1565c0; }
.nm-2 { background:#6a1b9a; }
.nm-3 { background:#b71c1c; }
.nm-4 { background:#2e7d32; }
.nm-5 { background:#e65100; }

/* Detail modal */
#note-detail {
  position:fixed; inset:0; background:rgba(0,0,0,.75);
  z-index:4000; display:none; align-items:center; justify-content:center;
  padding:16px;
}
#note-detail.open { display:flex; }
#note-detail-box {
  background:var(--panel); width:100%; max-width:480px;
  border-radius:12px; overflow:hidden; max-height:85vh; display:flex; flex-direction:column;
}
#note-detail-header {
  padding:12px 14px; display:flex; align-items:center; gap:8px;
  border-bottom:1px solid var(--border);
}
#note-detail-cat { font-size:11px; font-weight:700; padding:3px 8px; border-radius:10px; }
#note-detail-title { flex:1; font-size:14px; font-weight:700; }
#note-detail-close { background:none; border:none; color:var(--text2); font-size:20px; cursor:pointer; }
#note-detail-body { padding:14px; overflow-y:auto; flex:1; }
#note-detail-meta { font-size:11px; color:var(--text2); margin-bottom:8px; }
#note-detail-text { font-size:14px; line-height:1.6; margin-bottom:12px; white-space:pre-wrap; }
#note-detail-photos { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.detail-photo { position:relative; }
.detail-photo img { width:120px; height:90px; object-fit:cover; border-radius:8px; cursor:zoom-in; }
.detail-photo-del {
  position:absolute; top:4px; right:4px; background:rgba(233,69,96,.9);
  color:#fff; border:none; border-radius:50%; width:22px; height:22px;
  font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
#note-detail-footer { padding:10px 14px; border-top:1px solid var(--border); display:flex; gap:8px; }
.note-del-btn { flex:1; background:var(--accent); color:#fff; border:none; border-radius:8px; padding:9px; font-size:13px; font-weight:700; cursor:pointer; }
.note-close-btn { flex:1; background:var(--panel2); color:var(--text2); border:1px solid var(--border); border-radius:8px; padding:9px; font-size:13px; cursor:pointer; }

/* Fullscreen foto */
#photo-fs { position:fixed; inset:0; background:rgba(0,0,0,.95); z-index:5000; display:none; align-items:center; justify-content:center; cursor:zoom-out; }
#photo-fs.open { display:flex; }
#photo-fs img { max-width:100%; max-height:100%; object-fit:contain; }

/* Sync indikátor */
#sync-indicator {
  position:fixed; bottom:80px; left:12px; background:var(--panel2);
  border:1px solid var(--border); border-radius:8px; padding:6px 10px;
  font-size:11px; color:var(--text2); z-index:1200; display:none;
}
#sync-indicator.show { display:block; }

</style>
</head>

<div id="header">
  <h1>I/3 <span>Votice – Oldřichovec</span></h1>
  <div id="km-display">km –</div>
  <button id="btn-layers" onclick="toggleLayers()">☰ Vrstvy</button>
</div>

<div id="map"></div>

<div id="layers-panel">
  <h3>🗺️ Podklady</h3>
  <div id="basemap-row">
    <button class="bm-btn" onclick="setBasemap('outdoor',this)">Outdoor</button>
    <button class="bm-btn" onclick="setBasemap('basic',this)">Basic</button>
    <button class="bm-btn" onclick="setBasemap('aerial',this)">Letecká</button>
    <button class="bm-btn active" id="osm-btn" onclick="setBasemap('osm',this)">OSM</button>
  </div>
  <h3>📍 Vrstvy</h3>
  <div class="layer-row">
    <label>🛣️ Trasa</label>
    <label class="toggle"><input type="checkbox" id="lyr-trasa" checked onchange="toggleLayer('trasa',this.checked)"><span class="toggle-slider"></span></label>
  </div>
  <div class="layer-row">
    <label>📏 Staničení 100m</label>
    <label class="toggle"><input type="checkbox" id="lyr-st100" checked onchange="toggleLayer('st100',this.checked)"><span class="toggle-slider"></span></label>
  </div>
  <div class="layer-row">
    <label>📐 Staničení 20m</label>
    <label class="toggle"><input type="checkbox" id="lyr-st20" onchange="toggleLayer('st20',this.checked)"><span class="toggle-slider"></span></label>
  </div>
  <div class="layer-row">
    <label>📝 Poznámky</label>
    <label class="toggle"><input type="checkbox" id="lyr-notes" checked onchange="toggleNotesLayer(this.checked)"><span class="toggle-slider"></span></label>
  </div>
  <div class="layer-row">
    <label>✂️ Příčné řezy (PŘ)</label>
    <label class="toggle"><input type="checkbox" id="lyr-pr" checked onchange="toggleLayer('pr',this.checked)"><span class="toggle-slider"></span></label>
  </div>
  <div class="layer-row">
    <label>📍 GPS poloha</label>
    <label class="toggle"><input type="checkbox" id="lyr-gps" checked onchange="toggleGPS(this.checked)"><span class="toggle-slider"></span></label>
  </div>
</div>

<button id="btn-gps" onclick="centerGPS()" title="Centrovat GPS">📍</button>
<div id="toast"></div>

<div id="pdf-panel">
  <div id="pdf-header">
    <button id="btn-pdf-prev" onclick="docNav(-1)">&#8249;</button>
    <div id="pdf-title">Situace</div>
    <div id="pdf-counter"></div>
    <button id="btn-pdf-next" onclick="docNav(1)">&#8250;</button>
    <button id="btn-pdf-fs" onclick="togglePdfFs()">⛶</button>
    <button id="btn-pdf-close" onclick="closePdf()">✕</button>
  </div>
  <div id="pdf-tabs"></div>
  <iframe id="pdf-frame" src=""></iframe>
  <div id="pdf-nosit"><span>📄</span><div>Pro toto staničení nejsou výkresy k dispozici</div></div>
</div>

// ── MATH ──────────────────────────────
function haversine(lat1,lon1,lat2,lon2) {
  var R=6371000, p1=lat1*Math.PI/180, p2=lat2*Math.PI/180;
  var dp=(lat2-lat1)*Math.PI/180, dl=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dp/2)*Math.sin(dp/2)+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)*Math.sin(dl/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function buildCumulative() {
  gpxCumulative=[0];
  for(var i=1;i<GPX_POINTS.length;i++)
    gpxCumulative.push(gpxCumulative[i-1]+haversine(GPX_POINTS[i-1][0],GPX_POINTS[i-1][1],GPX_POINTS[i][0],GPX_POINTS[i][1]));
}

function buildCalibSorted() {
  calibSorted=CALIB_POINTS.map(function(cp){
    var minD=Infinity,minCum=0;
    for(var i=0;i<GPX_POINTS.length;i++){
      var d=haversine(cp.lat,cp.lng,GPX_POINTS[i][0],GPX_POINTS[i][1]);
      if(d<minD){minD=d;minCum=gpxCumulative[i];}
    }
    return {gpxM:minCum,realKm:cp.km};
  }).sort(function(a,b){return a.realKm-b.realKm;});
}

function interp(arr,xKey,yKey,x) {
  var s=arr;
  if(x<=s[0][xKey]){var sl=(s[1][yKey]-s[0][yKey])/(s[1][xKey]-s[0][xKey]);return s[0][yKey]+sl*(x-s[0][xKey]);}
  if(x>=s[s.length-1][xKey]){var n=s.length-1,sl2=(s[n][yKey]-s[n-1][yKey])/(s[n][xKey]-s[n-1][xKey]);return s[n][yKey]+sl2*(x-s[n][xKey]);}
  for(var j=0;j<s.length-1;j++){if(x>=s[j][xKey]&&x<=s[j+1][xKey]){var t=(x-s[j][xKey])/(s[j+1][xKey]-s[j][xKey]);return s[j][yKey]+t*(s[j+1][yKey]-s[j][yKey]);}}
  return s[0][yKey];
}

function realKmToLatLng(realKm) {
  var gpxM=interp(calibSorted,'realKm','gpxM',realKm);
  for(var i=0;i<gpxCumulative.length-1;i++){
    if(gpxM>=gpxCumulative[i]&&gpxM<=gpxCumulative[i+1]){
      var seg=gpxCumulative[i+1]-gpxCumulative[i];
      var frac=seg>0?(gpxM-gpxCumulative[i])/seg:0;
      return [GPX_POINTS[i][0]+frac*(GPX_POINTS[i+1][0]-GPX_POINTS[i][0]),
              GPX_POINTS[i][1]+frac*(GPX_POINTS[i+1][1]-GPX_POINTS[i][1])];
    }
  }
  return null;
}

function gpxCumToRealKm(gpxM) {return interp(calibSorted,'gpxM','realKm',gpxM);}

function nearestOnRoute(lat,lng) {
  var minD=Infinity,minI=0;
  for(var i=0;i<GPX_POINTS.length;i++){var d=haversine(lat,lng,GPX_POINTS[i][0],GPX_POINTS[i][1]);if(d<minD){minD=d;minI=i;}}
  return {idx:minI,dist:minD,cum:gpxCumulative[minI]};
}

function fmtKm(km) {
  var w=Math.floor(km),f=Math.round((km-w)*1000);
  if(f===1000){w++;f=0;}
  return w+'+'+String(f).padStart(3,'0');
}

  // Text na PRAVÉ straně osy (opačně od staničení které je vlevo)

  var perpRad = (bear + 90) * Math.PI / 180;
  var offset = 32;
  var dx = Math.sin(perpRad) * offset;
  var dy = -Math.cos(perpRad) * offset;
  var DW = 50, DH = 24;
  var ancX = Math.round(-dx);          // anchor na LEVÉM okraji textu
  var ancY = Math.round(DH/2 + dy);

  var textHtml =
    '<div style="width:'+DW+'px;height:'+DH+'px;display:flex;align-items:center;justify-content:flex-start;pointer-events:all;cursor:pointer;">'+
    '<span class="pr-label">PŘ</span></div>';

// Azimut úseku mezi dvěma body (stupně, 0=N, 90=E)
function segBearing(lat1,lon1,lat2,lon2) {
  var p1=lat1*Math.PI/180, p2=lat2*Math.PI/180;
  var dl=(lon2-lon1)*Math.PI/180;
  var x=Math.sin(dl)*Math.cos(p2);
  var y=Math.cos(p1)*Math.sin(p2)-Math.sin(p1)*Math.cos(p2)*Math.cos(dl);
  return (Math.atan2(x,y)*180/Math.PI+360)%360;
}

// Vrátí bearing GPX segmentu nejbližšího k danému gpxM
function bearingAtGpxM(gpxM) {
  for(var i=0;i<gpxCumulative.length-1;i++){
    if(gpxM>=gpxCumulative[i]&&gpxM<=gpxCumulative[i+1]){
      return segBearing(GPX_POINTS[i][0],GPX_POINTS[i][1],GPX_POINTS[i+1][0],GPX_POINTS[i+1][1]);
    }
  }
  // fallback: poslední segment
  var n=GPX_POINTS.length-1;
  return segBearing(GPX_POINTS[n-1][0],GPX_POINTS[n-1][1],GPX_POINTS[n][0],GPX_POINTS[n][1]);
}

function addStaniceniMarkers(group,stepKm,is100) {
  var realKm=Math.round(Math.ceil(KM_START/stepKm)*stepKm*10000)/10000;
  while(realKm<=KM_END+0.0001){
    // Pro 20m staničení přeskočit pozice které jsou násobkem 100m (tam je 100m značka)
    var skip = false;
    if(!is100){
      var mod = Math.round(realKm * 1000) % 100;
      if(mod === 0) skip = true;
    }
    if(!skip){
      var gpxM=interp(calibSorted,'realKm','gpxM',realKm);
      var bear=bearingAtGpxM(gpxM);
      var pos=realKmToLatLng(realKm);
      if(pos) addStaniceniMarker(group,pos[0],pos[1],realKm,is100,bear);
    }
    realKm=Math.round((realKm+stepKm)*10000)/10000;
  }
}

  // Čárka je svislá, rotujeme ji o (bear+90)° → kolmá na osu trasy
  var tickRot = (bear + 90) % 360;
  // Plátno 60x60, střed=30,30 → anchor=30,30 = přesně na ose
  var C = 60, cc = C / 2;

    '<g transform="rotate('+tickRot.toFixed(1)+' '+cc+' '+cc+')">' +
      '<line x1="'+cc+'" y1="'+(cc-tickLen)+'" x2="'+cc+'" y2="'+(cc+tickLen)+'" '+
        'stroke="'+color+'" stroke-width="'+tickW+'" stroke-linecap="round" '+
        'stroke-opacity="1"/>' +
    '</g>' +
    '</svg>';

  var tickIcon = L.divIcon({
    className: '',
    html: tickSvg,
    iconSize: [C, C],
    iconAnchor: [cc, cc],
  });
  var tickM = L.marker([lat,lng],{icon:tickIcon,interactive:false,zIndexOffset:-10});
  tickM.addTo(group);

  // ── Text: horizontální, posunutý kolmo vlevo od osy ──
  var perpRad = (bear - 90) * Math.PI / 180;
  var dx = Math.sin(perpRad) * offset;
  var dy = -Math.cos(perpRad) * offset;
  var shadow = '-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000';
  var DW = 200, DH = 40;
  var ancX = Math.round(DW + dx);
  var ancY = Math.round(DH/2 + dy);

  var textHtml =
    '<div style="width:'+DW+'px;height:'+DH+'px;display:flex;align-items:center;'+
    'justify-content:flex-end;pointer-events:all;cursor:pointer;">'+
    '<span style="color:'+color+';font-size:'+fontSize+';font-weight:'+fontW+';'+
    'font-family:Segoe UI,system-ui,sans-serif;white-space:nowrap;line-height:1;'+
    'text-shadow:'+shadow+';">'+label+'</span></div>';

  var textIcon = L.divIcon({
    className: '',
    html: textHtml,
    iconSize: [DW, DH],
    iconAnchor: [ancX, ancY],
  });
  var textM = L.marker([lat,lng],{icon:textIcon,interactive:true});
  (function(km){
    textM.on('click',function(e){L.DomEvent.stopPropagation(e);onStaniceniClick(km);});
  })(realKm);
  textM.addTo(group);
}

// ── VÝKRESY – multi-dokument panel ──────
function findDocForKm(docs, realKm) {
  var found = docs.filter(function(d){return realKm>=d.kmOd&&realKm<=d.kmDo;});
  if(!found.length) return null;
  found.sort(function(a,b){var mA=(a.kmOd+a.kmDo)/2,mB=(b.kmOd+b.kmDo)/2;return Math.abs(realKm-mA)-Math.abs(realKm-mB);});
  return found[0];
}

function onStaniceniClick(realKm) {
  showToast('km '+fmtKm(realKm),1500);
  // Sestav seznam všech výkresů pro toto km
  var pages = [];
  var sit = findDocForKm(DOCS_SITUACE, realKm);
  var pp  = findDocForKm(DOCS_PP, realKm);
  var vpr = findDocForKm(DOCS_VPR, realKm);
  if(sit) pages.push({soubor:sit.soubor, nazev:sit.nazev, typ:'📐 Situace'});
  if(pp)  pages.push({soubor:pp.soubor,  nazev:pp.nazev,  typ:'📊 Pod. profil'});
  if(vpr) pages.push({soubor:vpr.soubor, nazev:vpr.nazev, typ:'✂️ Příčné řezy'});
  openDocPanel(pages, realKm, 0);
}

function openDocPanel(pages, realKm, startIdx) {
  docPages   = pages;
  docPageIdx = startIdx || 0;
  var panel  = document.getElementById('pdf-panel');
  panel.classList.add('open');
  // Sestav záložky
  var tabs = document.getElementById('pdf-tabs');
  tabs.innerHTML = '';
  pages.forEach(function(p, i) {
    var btn = document.createElement('button');
    btn.className = 'pdf-tab' + (i===docPageIdx?' active':'');
    btn.textContent = p.typ;
    btn.onclick = (function(idx){return function(){docGoTo(idx);};})(i);
    tabs.appendChild(btn);
  });
  renderDocPage(realKm);
}

function renderDocPage(realKm) {
  var frame  = document.getElementById('pdf-frame');
  var nosit  = document.getElementById('pdf-nosit');
  var title  = document.getElementById('pdf-title');
  var ctr    = document.getElementById('pdf-counter');
  var btnP   = document.getElementById('btn-pdf-prev');
  var btnN   = document.getElementById('btn-pdf-next');
  // Aktualizuj záložky
  document.querySelectorAll('.pdf-tab').forEach(function(b,i){
    b.classList.toggle('active', i===docPageIdx);
  });
  if(docPages.length===0){
    frame.src=''; frame.style.display='none'; nosit.style.display='flex';
    title.textContent='Výkresy — km '+(realKm?fmtKm(realKm):'');
    ctr.textContent=''; btnP.disabled=true; btnN.disabled=true;
    return;
  }
  var p = docPages[docPageIdx];
  title.textContent = p.nazev;
  ctr.textContent   = (docPageIdx+1)+' / '+docPages.length;
  btnP.disabled = docPageIdx===0;
  btnN.disabled = docPageIdx===docPages.length-1;
  frame.src = p.soubor;
  frame.style.display = 'block';
  nosit.style.display = 'none';
}

function docNav(dir) {
  var newIdx = docPageIdx + dir;
  if(newIdx<0||newIdx>=docPages.length) return;
  docPageIdx = newIdx;
  renderDocPage();
}

function docGoTo(idx) {
  docPageIdx = idx;
  renderDocPage();
}

function closePdf() {
  document.getElementById('pdf-panel').classList.remove('open','fullscreen');
  document.getElementById('pdf-frame').src='';
  docPages=[]; docPageIdx=0;
}
function togglePdfFs() {document.getElementById('pdf-panel').classList.toggle('fullscreen');}

// ── GPS ───────────────────────────────
function toggleGPS(en){en?startGPS():stopGPS();}

function startGPS() {
  if(!navigator.geolocation){showToast('GPS není k dispozici');return;}
  gpsActive=true; gpsCentering=true;
  document.getElementById('btn-gps').classList.add('active');
  gpsWatcher=navigator.geolocation.watchPosition(
    function(pos){updateGPS(pos.coords.latitude,pos.coords.longitude);},
    function(err){showToast('GPS chyba: '+err.message);},
    {enableHighAccuracy:true,maximumAge:2000,timeout:10000}
  );
}

function stopGPS() {
  gpsActive=false;
  document.getElementById('btn-gps').classList.remove('active');
  if(gpsWatcher!==null){navigator.geolocation.clearWatch(gpsWatcher);gpsWatcher=null;}
  if(gpsMarker){map.removeLayer(gpsMarker);gpsMarker=null;}
  document.getElementById('km-display').textContent='km –';
}

function updateGPS(lat,lng) {
  var icon=L.divIcon({className:'',html:'<div class="gps-dot"></div>',iconSize:[16,16],iconAnchor:[8,8]});
  if(!gpsMarker){gpsMarker=L.marker([lat,lng],{icon:icon,zIndexOffset:1000}).addTo(map);}
  else{gpsMarker.setLatLng([lat,lng]);}
  var n=nearestOnRoute(lat,lng);
  document.getElementById('km-display').textContent='km '+fmtKm(gpxCumToRealKm(n.cum));
  if(gpsCentering) map.setView([lat,lng],map.getZoom());
}

function centerGPS() {
  if(!gpsActive){document.getElementById('lyr-gps').checked=true;startGPS();}
  else{gpsCentering=true;if(gpsMarker)map.setView(gpsMarker.getLatLng(),16);}
}

// ── VRSTVY ────────────────────────────
function toggleLayers(){document.getElementById('layers-panel').classList.toggle('open');}
function closeLayersPanel(){document.getElementById('layers-panel').classList.remove('open');}

function toggleLayer(name,en){
  if(!layerGroups[name])return;
  en?layerGroups[name].addTo(map):map.removeLayer(layerGroups[name]);
}

function setBasemap(type,btn){
  if(currentBasemap===type)return;
  map.removeLayer(baseLayers[currentBasemap]);
  baseLayers[type].addTo(map);
  currentBasemap=type;
  document.querySelectorAll('.bm-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}

// ── INIT ──────────────────────────────
function init() {
  buildCumulative();
  buildCalibSorted();
  initMap();
  buildRoute();
  buildStaniceni100();
  buildStaniceni20();
  buildPR();
  map.fitBounds(L.latLngBounds(GPX_POINTS.map(function(p){return[p[0],p[1]];})),{padding:[40,40]});
  startGPS();

  showToast('I/3 Votice – Oldřichovec ✓',3000);

window.addEventListener('load',init);

// ═══════════════════════════════════════════════════════
//  POZNÁMKY – GitHub Contents API
// ═══════════════════════════════════════════════════════
var NOTE_CATS = [
  {label:'📌 Obecná',   cls:'nc-0', pin:'nm-0'},
  {label:'🏗️ Záporník', cls:'nc-1', pin:'nm-1'},
  {label:'🪨 Beton',    cls:'nc-2', pin:'nm-2'},
  {label:'⚠️ Problém',  cls:'nc-3', pin:'nm-3'},
  {label:'✅ Hotovo',   cls:'nc-4', pin:'nm-4'},
  {label:'🔍 Kontrola', cls:'nc-5', pin:'nm-5'},
];

var notesData    = [];        // pole poznámek
var notesGhSha   = null;      // SHA souboru na GitHubu (nutné pro PUT)
var notesLayer   = null;
var newNoteLat   = null;
var newNoteLng   = null;
var newNoteCat   = 0;
var newNotePhotos= [];        // [{dataUrl, name}]
var currentNoteId= null;
var longPressTimer = null;

function showSync(msg) {
  var el = document.getElementById('sync-indicator');
  el.textContent = msg || '⏳ Ukládám...';
  el.classList.add('show');
}
function hideSync() { document.getElementById('sync-indicator').classList.remove('show'); }

// ── GitHub API ─────────────────────────────────────────
function ghHeaders() {
  return {
    'Authorization': 'token ' + GH_TOKEN,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json',
  };
}

function loadNotes() {
  showSync('⏳ Načítám poznámky...');
  fetch(GH_API + '?t=' + Date.now(), {headers: ghHeaders()})
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if(data.sha) {
        notesGhSha = data.sha;
        var decoded = atob(data.content.replace(/\n/g,''));
        var parsed = JSON.parse(decodeURIComponent(escape(decoded)));
        notesData = parsed.notes || [];
      } else {
        notesData = [];
      }
      hideSync();
      renderNoteMarkers();
    })
    .catch(function(){ hideSync(); showToast('Poznámky offline',2000); });
}

function saveNotesToGh(callback) {
  showSync('⏳ Ukládám...');
  var payload = JSON.stringify({notes: notesData}, null, 0);
  var encoded = btoa(unescape(encodeURIComponent(payload)));
  var body = {message: 'Aktualizace poznámek', content: encoded};
  if(notesGhSha) body.sha = notesGhSha;
  fetch(GH_API, {
    method: 'PUT',
    headers: ghHeaders(),
    body: JSON.stringify(body)
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if(data.content && data.content.sha) notesGhSha = data.content.sha;
    hideSync();
    showToast('✅ Uloženo',1500);
    if(callback) callback();
  })
  .catch(function(){ hideSync(); showToast('❌ Chyba uložení',2500); });
}

// ── Markery ────────────────────────────────────────────
function renderNoteMarkers() {
  if(!notesLayer) {
    notesLayer = L.layerGroup().addTo(map);
    layerGroups.notes = notesLayer;
  } else {
    notesLayer.clearLayers();
  }
  notesData.forEach(function(note) {
    var cat = NOTE_CATS[note.cat] || NOTE_CATS[0];
    var icon = L.divIcon({
      className: '',
      html: '<div class="note-marker-pin ' + cat.pin + '"></div>',
      iconSize: [30,30],
      iconAnchor: [15,30],
    });
    var m = L.marker([note.lat, note.lng], {icon:icon, zIndexOffset:500});
    (function(n){ m.on('click', function(e){ L.DomEvent.stopPropagation(e); openNoteDetail(n.id); }); })(note);
    m.addTo(notesLayer);
  });
}

// ── Dlouhý stisk mapy = nová poznámka ─────────────────
function initLongPress() {
  map.on('mousedown touchstart', function(e) {
    var latlng = e.latlng;
    longPressTimer = setTimeout(function() {
      if(navigator.vibrate) navigator.vibrate(50);
      newNoteLat = latlng.lat;
      newNoteLng = latlng.lng;
      newNotePhotos = [];
      newNoteCat = 0;
      document.getElementById('note-author').value = localStorage.getItem('noteAuthor') || '';
      document.getElementById('note-text').value = '';
      document.getElementById('note-photos-preview').innerHTML = '';
      selectCat(0);
      document.getElementById('note-modal').classList.add('open');
    }, 700);
  });
  map.on('mouseup touchend touchcancel mousemove', function() {
    if(longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  });
}

function selectCat(idx) {
  newNoteCat = idx;
  document.querySelectorAll('.note-cat').forEach(function(el){
    el.classList.toggle('sel', parseInt(el.dataset.cat) === idx);
  });
}

function closeNoteModal() {
  document.getElementById('note-modal').classList.remove('open');
  newNotePhotos = [];
}

// ── Fotky v editaci ────────────────────────────────────
window.addEventListener('load', function() {
  document.getElementById('note-photo-input').addEventListener('change', function(e) {
    var files = Array.from(e.target.files);
    files.forEach(function(file) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        // Komprimuj obrázek
        compressImage(ev.target.result, function(compressed) {
          newNotePhotos.push({dataUrl: compressed, name: file.name});
          renderNewPhotoPreviews();
        });
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  });
});

function compressImage(dataUrl, callback) {
  var img = new Image();
  img.onload = function() {
    var canvas = document.createElement('canvas');
    var MAX = 800;
    var w = img.width, h = img.height;
    if(w > MAX || h > MAX) {
      if(w > h) { h = Math.round(h * MAX/w); w = MAX; }
      else { w = Math.round(w * MAX/h); h = MAX; }
    }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', 0.75));
  };
  img.src = dataUrl;
}

function renderNewPhotoPreviews() {
  var el = document.getElementById('note-photos-preview');
  el.innerHTML = '';
  newNotePhotos.forEach(function(p, i) {
    var div = document.createElement('div');
    div.className = 'note-thumb';
    div.innerHTML = '<img src="'+p.dataUrl+'"><button class="note-thumb-del" onclick="removeNewPhoto('+i+')">✕</button>';
    el.appendChild(div);
  });
}

function removeNewPhoto(idx) {
  newNotePhotos.splice(idx, 1);
  renderNewPhotoPreviews();
}

// ── Uložení poznámky ───────────────────────────────────
function saveNote() {
  var author = document.getElementById('note-author').value.trim();
  var text   = document.getElementById('note-text').value.trim();
  if(!author) { showToast('Zadejte jméno!', 2000); return; }
  localStorage.setItem('noteAuthor', author);

  var note = {
    id:      Date.now().toString(),
    lat:     newNoteLat,
    lng:     newNoteLng,
    cat:     newNoteCat,
    author:  author,
    text:    text,
    photos:  newNotePhotos.map(function(p){ return p.dataUrl; }),
    time:    new Date().toLocaleString('cs-CZ'),
  };

  notesData.push(note);
  closeNoteModal();
  renderNoteMarkers();
  saveNotesToGh(null);
}

// ── Detail poznámky ────────────────────────────────────
function openNoteDetail(id) {
  var note = notesData.filter(function(n){ return n.id === id; })[0];
  if(!note) return;
  currentNoteId = id;
  var cat = NOTE_CATS[note.cat] || NOTE_CATS[0];

  var catEl = document.getElementById('note-detail-cat');
  catEl.textContent = cat.label;
  catEl.className = 'nc-' + note.cat;
  catEl.style.cssText = 'font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;';

  document.getElementById('note-detail-title').textContent = '';
  document.getElementById('note-detail-meta').textContent = '👤 ' + note.author + '   🕐 ' + note.time;
  document.getElementById('note-detail-text').textContent = note.text || '(bez textu)';

  // Fotky
  var photosEl = document.getElementById('note-detail-photos');
  photosEl.innerHTML = '';
  (note.photos || []).forEach(function(src, pi) {
    var div = document.createElement('div');
    div.className = 'detail-photo';
        var img = document.createElement('img');
    img.src = src;
    img.style.cssText = 'cursor:zoom-in;width:120px;height:90px;object-fit:cover;border-radius:8px;';
    img.onclick = function(){ openPhotoFs(this.src); };
    var btn = document.createElement('button');
    btn.className = 'detail-photo-del';
    btn.textContent = '✕';
    (function(nid, pidx){ btn.onclick = function(){ deleteNotePhoto(nid, pidx); }; })(id, pi);
    div.appendChild(img);
    div.appendChild(btn);
    photosEl.appendChild(div);
  });

  document.getElementById('note-detail').classList.add('open');
}

function closeNoteDetail() {
  document.getElementById('note-detail').classList.remove('open');
  currentNoteId = null;
}

function openPhotoFs(src) {
  // src can be string or img element
  var url = (typeof src === 'string') ? src : src.src;
  document.getElementById('photo-fs-img').src = url;
  document.getElementById('photo-fs').classList.add('open');
}

function deleteNotePhotoByEl(btn, noteId, photoIdx) {
  deleteNotePhoto(noteId, photoIdx);
}

function deleteNotePhoto(noteId, photoIdx) {
  var note = notesData.filter(function(n){ return n.id === noteId; })[0];
  if(!note) return;
  note.photos.splice(photoIdx, 1);
  saveNotesToGh(function(){ openNoteDetail(noteId); });
}

function deleteCurrentNote() {
  if(!currentNoteId) return;
  if(!confirm('Smazat tuto poznámku?')) return;
  notesData = notesData.filter(function(n){ return n.id !== currentNoteId; });
  closeNoteDetail();
  renderNoteMarkers();
  saveNotesToGh(null);
}

// ── Layer toggle pro poznámky ──────────────────────────
function toggleNotesLayer(en) {
  if(!notesLayer) return;
  en ? notesLayer.addTo(map) : map.removeLayer(notesLayer);
}

</script>
